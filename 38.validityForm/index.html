<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
  <title>Валидация форм</title>
</head>
<body>
  <form id="regForm" action="/registration" method="post" noValidate data-js-form>
    <p class="field">
      <label class="field__label" for="login">Логин</label>
      <input 
          class="field__control" 
          id="login" 
          name="login" 
          required 
          minlength="3"
          maxlength="12"
          aria-errormessage="login-errors"
        />
        <span class="field__errors" id="login-errors" data-js-form-field-errors></span>
    </p>
    <p class="field">
      <label class="field__label" for="password">Пароль</label>
      <input 
          class="field__control" 
          id="password" 
          name="password" 
          type="password" 
          required 
          minlength="8"
          maxlength="16"
          pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,16}"
          title="Пароль должен быть от 8 до 16 символов, включать в себя как минимум одну
          букву в нижнем регистре и одну букву в верхнем регистре"
          aria-errormessage="password-errors"
        />
        <span class="field__errors" id="password-errors" data-js-form-field-errors></span>
    </p>
    <p class="field">
      <label class="field__label" for="about">О себе</label>
      <textarea class="field__control"
          id="about"
          name="about" 
          required
          aria-errormessage="about-errors"></textarea>
      <span class="field__errors" id="about-errors" data-js-form-field-errors></span>
    </p>
    <fieldset class="radios">
      <legend class="radios__legend">Ваш пол</legend>

      <input 
          class="radios__control" 
          id="male" 
          name="gender" 
          type="radio" 
          value="Мужской"
          required
          aria-errormessage="gender-errors"
        />
      <label class="radios__label" for="male">Мужской</label>

      <input 
          class="radios__control" 
          id="female" 
          name="gender" 
          type="radio" 
          value="Женский"
          aria-errormessage="gender-errors"
        />
      <label class="radios__label" for="female">Женский</label>
      <span class="field__errors" id="gender-errors" data-js-form-field-errors></span>
    </fieldset>
    <div class="field checkbox">
      <input class="checkbox__control" id="agreement" name="agreement" type="checkbox" />
      <label class="field__label checkbox__label" for="agreement">Согласен на всё</label>
    </div>
    <button type="submit">Регистрация</button>
  </form>
</body>
</html>
